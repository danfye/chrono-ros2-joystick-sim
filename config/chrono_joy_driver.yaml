chrono_joy_driver:
  ros__parameters:
    joy_topic: /joy

    # Steering maps to Chrono steering after deadzone, inversion, and scaling.
    steering_axis: 0
    invert_steering: false
    steering_scale: 1.0

    # Default mode: one combined axis. Positive values throttle, negative values brake.
    throttle_brake_axis: 1
    throttle_scale: 1.0
    brake_scale: 1.0
    invert_throttle: false
    invert_brake: false

    # Optional split-pedal mode. Set one or both axes to >= 0 to use them.
    throttle_axis: -1
    brake_axis: -1

    # Optional buttons. Keep -1 to disable the requirement.
    enable_button: -1
    deadman_button: -1

    deadzone: 0.1
    joystick_timeout_seconds: 0.5
    safe_brake_on_timeout: true
    # Keep the demo gentle by default: timeout/deadman clears stale throttle and coasts.
    # Use a positive value such as 0.4 in a profile when active safety braking is desired.
    safe_brake_value: 0.0

    step_size: 0.002
    chrono_data_path: /usr/local/share/chrono/data/
